appId: com.gattendance.app
productName: G-Attendance
directories:
  output: dist-electron

files:
  - electron/**/*
  - frontend/dist/**/*
  - "!node_modules"
  - "!frontend/node_modules"
  - "!frontend/src"
  - "!data"
  - "!scripts"
  - "!__pycache__"

extraResources:
  - from: dist-backend/
    to: backend/
  - from: data/
    to: data/
  - from: "Holidays and sick leaves - Counting.xlsx"
    to: "data/Holidays and sick leaves - Counting.xlsx"
  - from: frontend/dist/
    to: frontend/dist/

mac:
  category: public.app-category.business
  target:
    - dmg
    - dir
  icon: build/icon.icns
  identity: null
